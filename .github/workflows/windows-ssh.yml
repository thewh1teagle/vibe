name: Temporary Windows SSH

on:
  workflow_dispatch:
  push:
    branches:
      - agent/windows-tmate

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-2025
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v6

      - name: Open SSH session
        id: tmate
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          detached: true

      - name: Save SSH connection details
        shell: pwsh
        run: |
          '${{ steps.tmate.outputs.ssh-command }}' |
            Set-Content -Path tmate-ssh.txt

      - name: Publish SSH connection details
        uses: actions/upload-artifact@v4
        with:
          name: tmate-connection
          path: tmate-ssh.txt
          retention-days: 1

      - name: Keep runner alive
        shell: pwsh
        run: |
          Write-Host 'Runner ready. Create $env:GITHUB_WORKSPACE\continue to finish.'
          while (-not (Test-Path "$env:GITHUB_WORKSPACE\continue")) {
            Start-Sleep -Seconds 5
          }
