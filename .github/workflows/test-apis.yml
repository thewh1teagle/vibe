name: Test Scraper APIs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Sweden regeringen.se
        continue-on-error: true
        run: |
          echo "=== Sweden index page ==="
          curl -s --http1.1 --max-time 15 -L -A "Mozilla/5.0" "https://www.regeringen.se/uds-reseinformation/" | grep -o 'href="[^"]*uds-reseinformation[^"]*"' | head -10 || echo "geen links"
          echo ""
          echo "=== Sweden ud-resklar page ==="
          curl -s --http1.1 --max-time 15 -L -A "Mozilla/5.0" "https://www.regeringen.se/uds-reseinformation/ud-resklar/" | grep -i "thailand\|avr\|land\|länder" | head -5 || echo "geen match"
          echo ""
          echo "=== Sweden country page attempt ==="
          curl -s --http1.1 --max-time 15 -o /dev/null -w "%{http_code}" -L -A "Mozilla/5.0" "https://www.regeringen.se/uds-reseinformation/thailand/"
          echo ""
          curl -s --http1.1 --max-time 15 -o /dev/null -w "%{http_code}" -L -A "Mozilla/5.0" "https://www.regeringen.se/uds-reseinformation/ud-resklar/thailand/"
