name: Test Scraper APIs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check Germany UAE reportUrl and all fields
        continue-on-error: true
        run: |
          echo "=== Germany UAE all fields ==="
          curl -s "https://www.auswaertiges-amt.de/opendata/travelwarning" | python3 -c "import json,sys; d=json.load(sys.stdin); r=d['response']; ae=[v for v in r.values() if isinstance(v,dict) and v.get('countryCode')=='AE']; e=ae[0] if ae else {}; [print(k,'=',v) for k,v in e.items() if k!='content']"
