name: Test Scraper APIs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Sweden country list
        continue-on-error: true
        run: |
          echo "=== Sweden landen pagina links ==="
          curl -s --http1.1 --max-time 20 -L -A "Mozilla/5.0" \
            "https://www.regeringen.se/uds-reseinformation/reseinformation-for-olika-lander/" \
            | grep -o 'href="/uds-reseinformation/[^"]*"' | head -20
          echo ""
          echo "=== Sweden avradan pagina ==="
          curl -s --http1.1 --max-time 20 -L -A "Mozilla/5.0" \
            "https://www.regeringen.se/uds-reseinformation/avradan---nar-ud-avrader-fran-resor/" \
            | grep -o 'href="/uds-reseinformation/[^"]*"' | head -20
