name: Test Scraper APIs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Australia smartraveller
        run: |
          echo "=== AU main site ==="
          curl -s -A "Mozilla/5.0" "https://www.smartraveller.gov.au/sitemap.xml" | grep -i "destination" | head -5
          echo "=== AU API attempt ==="
          curl -s -o /dev/null -w "%{http_code}" -A "Mozilla/5.0" "https://www.smartraveller.gov.au/api/destinations"
          echo ""
          curl -s -o /dev/null -w "%{http_code}" -A "Mozilla/5.0" "https://www.smartraveller.gov.au/destinations.json"
          echo ""
          curl -s -A "Mozilla/5.0" "https://www.smartraveller.gov.au/destinations/thailand" | grep -i "level\|caution\|travel" | head -5

      - name: Test Canada with timeout
        run: |
          echo "=== Canada TH ==="
          curl -s --max-time 30 "https://data.international.gc.ca/travel-voyage/countries/cta-cap-th.json" | head -c 300 || echo "TIMEOUT"

      - name: Test Sweden new URL
        run: |
          echo "=== Sweden new travel advice page ==="
          curl -s -o /dev/null -w "%{http_code}" -L -A "Mozilla/5.0" "https://www.swedenabroad.se/sv/utrikesdepartementet/reserad/reserad-per-land/"
          echo ""
          curl -s -o /dev/null -w "%{http_code}" -L -A "Mozilla/5.0" "https://www.swedenabroad.se/sv/utrikesdepartementet/reserad/"
          echo ""
          curl -s -L -A "Mozilla/5.0" "https://www.swedenabroad.se" | grep -i "reseråd\|reseinformation\|travel" | head -5
