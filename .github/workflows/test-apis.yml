name: Test Scraper APIs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check Canada advisory-state values
        run: |
          echo "=== Canada UAE (should be high warning) ==="
          curl -s --http1.1 --max-time 20 "https://data.international.gc.ca/travel-voyage/countries/cta-cap-ae.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print('state:', d['data']['advisory-state']); print('eng:', d['data'].get('eng',{}))"
          echo "=== Canada Syria (should be do not travel) ==="
          curl -s --http1.1 --max-time 20 "https://data.international.gc.ca/travel-voyage/countries/cta-cap-sy.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print('state:', d['data']['advisory-state'])"
          echo "=== Canada Germany (should be normal) ==="
          curl -s --http1.1 --max-time 20 "https://data.international.gc.ca/travel-voyage/countries/cta-cap-de.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print('state:', d['data']['advisory-state'])"
          echo "=== Canada Ukraine (should be avoid all) ==="
          curl -s --http1.1 --max-time 20 "https://data.international.gc.ca/travel-voyage/countries/cta-cap-ua.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print('state:', d['data']['advisory-state'])"
          echo "=== Germany UAE flags ==="
          curl -s "https://www.auswaertiges-amt.de/opendata/travelwarning" | python3 -c "
import json,sys
d=json.load(sys.stdin)
for k,v in d['response'].items():
    if v.get('countryCode') == 'AE':
        print('UAE:', v)
        break
"
