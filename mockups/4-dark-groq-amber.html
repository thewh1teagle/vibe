<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Vibe — Dark / Groq Cloud</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			html,
			body {
				height: 100%;
				font-family:
					'Inter',
					system-ui,
					-apple-system,
					sans-serif;
				color: #e4e7ec;
				-webkit-font-smoothing: antialiased;
				font-feature-settings: 'cv11', 'ss01';
			}
			.page {
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 40px 16px;
				background:
					radial-gradient(900px 600px at 50% -10%, #1f1a17 0%, transparent 60%),
					radial-gradient(800px 500px at 50% 110%, #1a0f08 0%, transparent 60%), #0c0a08;
				position: relative;
				overflow: hidden;
			}
			.glow {
				position: absolute;
				border-radius: 50%;
				filter: blur(110px);
				opacity: 0.35;
				pointer-events: none;
			}
			.g1 {
				width: 360px;
				height: 360px;
				background: #f97316;
				top: 10%;
				left: 8%;
			}
			.window {
				width: 480px;
				height: 470px;
				border-radius: 14px;
				background: #15120f;
				border: 1px solid rgba(255, 255, 255, 0.07);
				box-shadow:
					0 0 0 1px rgba(255, 255, 255, 0.02) inset,
					0 30px 60px -20px rgba(0, 0, 0, 0.7),
					0 18px 40px -10px rgba(249, 115, 22, 0.15);
				display: flex;
				flex-direction: column;
				overflow: hidden;
				position: relative;
			}
			.titlebar {
				height: 34px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 0 14px;
				border-bottom: 1px solid rgba(255, 255, 255, 0.06);
				background: linear-gradient(180deg, #1c1814, #171310);
			}
			.titlebar .dots {
				display: flex;
				gap: 6px;
			}
			.titlebar .dot {
				width: 11px;
				height: 11px;
				border-radius: 50%;
				box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.2);
			}
			.dot.r {
				background: #ff5f57;
			}
			.dot.y {
				background: #febc2e;
			}
			.dot.g {
				background: #28c840;
			}
			.titlebar .name {
				font-size: 11px;
				font-weight: 500;
				color: #98a2b3;
				letter-spacing: 0.01em;
			}
			.content {
				padding: 18px 22px 20px;
				display: flex;
				flex-direction: column;
				gap: 14px;
				flex: 1;
				overflow: hidden;
			}
			.brand {
				display: flex;
				align-items: center;
				gap: 12px;
			}
			.brand .logo {
				width: 36px;
				height: 36px;
				border-radius: 9px;
				display: grid;
				place-items: center;
				background: linear-gradient(135deg, rgba(251, 146, 60, 0.2), rgba(249, 115, 22, 0.2));
				border: 1px solid rgba(251, 146, 60, 0.3);
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.06),
					0 0 24px -4px rgba(249, 115, 22, 0.45);
			}
			.brand .logo svg {
				width: 18px;
				height: 18px;
				color: #fb923c;
			}
			.brand h1 {
				font-size: 16px;
				font-weight: 600;
				letter-spacing: -0.015em;
				color: #e4e7ec;
			}
			.badge {
				margin-left: auto;
				font-size: 10.5px;
				font-weight: 600;
				letter-spacing: 0.02em;
				padding: 4px 9px;
				border-radius: 6px;
				display: inline-flex;
				align-items: center;
				gap: 5px;
				background: linear-gradient(135deg, rgba(251, 146, 60, 0.18), rgba(249, 115, 22, 0.12));
				color: #fdba74;
				border: 1px solid rgba(251, 146, 60, 0.35);
			}
			.badge::before {
				content: '';
				width: 5px;
				height: 5px;
				border-radius: 50%;
				background: #f97316;
				box-shadow: 0 0 6px #f97316;
			}
			.badge .api {
				font-size: 9px;
				font-weight: 500;
				color: rgba(253, 186, 116, 0.7);
				margin-left: 2px;
				padding-left: 6px;
				border-left: 1px solid rgba(251, 146, 60, 0.3);
			}
			.row {
				display: flex;
				gap: 8px;
				align-items: stretch;
			}
			.select {
				flex: 1;
				height: 36px;
				border-radius: 8px;
				padding: 0 30px 0 12px;
				font-size: 12.5px;
				font-weight: 500;
				color: #e4e7ec;
				background: #1a1612;
				border: 1px solid rgba(255, 255, 255, 0.08);
				box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.2);
				appearance: none;
				background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%2398a2b3' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
				background-repeat: no-repeat;
				background-position: right 10px center;
				transition: all 0.15s ease;
			}
			.select:hover {
				border-color: rgba(251, 146, 60, 0.3);
				background-color: #1f1a15;
			}
			.iconbtn {
				width: 36px;
				height: 36px;
				border-radius: 8px;
				display: grid;
				place-items: center;
				background: #1a1612;
				border: 1px solid rgba(255, 255, 255, 0.08);
				color: #98a2b3;
				cursor: pointer;
				transition: all 0.15s ease;
				box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.2);
			}
			.iconbtn:hover {
				background: #1f1a15;
				color: #e4e7ec;
				border-color: rgba(251, 146, 60, 0.3);
			}
			.iconbtn svg {
				width: 15px;
				height: 15px;
			}
			.divider {
				height: 1px;
				background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
			}
			.dictation {
				display: flex;
				align-items: center;
				gap: 12px;
			}
			.dictation .icon {
				width: 36px;
				height: 36px;
				border-radius: 50%;
				display: grid;
				place-items: center;
				background: linear-gradient(135deg, rgba(251, 146, 60, 0.2), rgba(249, 115, 22, 0.2));
				border: 1px solid rgba(251, 146, 60, 0.3);
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.06),
					0 0 20px -4px rgba(249, 115, 22, 0.45);
			}
			.dictation .icon svg {
				width: 15px;
				height: 15px;
				color: #fb923c;
			}
			.dictation .text h2 {
				font-size: 13px;
				font-weight: 600;
				color: #e4e7ec;
				letter-spacing: -0.005em;
			}
			.dictation .text p {
				font-size: 11.5px;
				color: #6c7383;
				margin-top: 1px;
			}
			.switch {
				width: 36px;
				height: 20px;
				border-radius: 999px;
				background: #2a2520;
				border: 1px solid rgba(255, 255, 255, 0.06);
				position: relative;
				cursor: pointer;
				flex-shrink: 0;
				transition: all 0.2s ease;
				box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
			}
			.switch::after {
				content: '';
				position: absolute;
				top: 1px;
				left: 1px;
				width: 16px;
				height: 16px;
				border-radius: 50%;
				background: #4a443f;
				box-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
				transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
			}
			.switch.on {
				background: rgba(251, 146, 60, 0.22);
				border-color: rgba(251, 146, 60, 0.4);
				box-shadow:
					inset 0 1px 2px rgba(0, 0, 0, 0.2),
					0 0 16px -2px rgba(249, 115, 22, 0.55);
			}
			.switch.on::after {
				transform: translateX(16px);
				background: #fb923c;
				box-shadow: 0 0 8px rgba(251, 146, 60, 0.6);
			}
			.card {
				border-radius: 10px;
				padding: 14px 14px 12px;
				background: #181410;
				border: 1px solid rgba(255, 255, 255, 0.06);
				box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
				display: flex;
				flex-direction: column;
				gap: 12px;
			}
			.field label {
				display: flex;
				align-items: center;
				gap: 5px;
				font-size: 10.5px;
				font-weight: 600;
				color: #6c7383;
				letter-spacing: 0.01em;
				margin-bottom: 6px;
			}
			.field label svg {
				width: 11px;
				height: 11px;
			}
			.keys {
				display: flex;
				align-items: center;
				gap: 6px;
			}
			.kbd {
				font-family: 'JetBrains Mono', ui-monospace, monospace;
				font-size: 10.5px;
				font-weight: 600;
				color: #d0d5dd;
				padding: 4px 8px;
				min-width: 24px;
				text-align: center;
				border-radius: 6px;
				background: #1f1a15;
				border: 1px solid rgba(255, 255, 255, 0.08);
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.04),
					0 1px 0 rgba(0, 0, 0, 0.2);
			}
			.kbd-input {
				flex: 1;
				font-family: 'JetBrains Mono', ui-monospace, monospace;
				font-size: 10.5px;
				color: #6c7383;
				padding: 5px 9px;
				border-radius: 6px;
				background: #100d0a;
				border: 1px solid rgba(255, 255, 255, 0.06);
				outline: none;
			}
			.modes {
				display: flex;
				gap: 6px;
			}
			.mode {
				flex: 1;
				padding: 7px 0;
				text-align: center;
				font-size: 11.5px;
				font-weight: 600;
				border-radius: 7px;
				cursor: pointer;
				transition: all 0.15s ease;
				background: #1f1a15;
				border: 1px solid rgba(255, 255, 255, 0.06);
				color: #98a2b3;
			}
			.mode:hover {
				background: #25201a;
				color: #e4e7ec;
				border-color: rgba(255, 255, 255, 0.1);
			}
			.mode.active {
				background: rgba(251, 146, 60, 0.15);
				border: 1px solid rgba(251, 146, 60, 0.4);
				color: #fdba74;
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.05),
					0 0 16px -4px rgba(249, 115, 22, 0.5);
			}
			.toggle-row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding-top: 2px;
				opacity: 0.45;
			}
			.toggle-row .lbl {
				font-size: 11.5px;
				font-weight: 500;
				color: #98a2b3;
			}
			.toggle-row .hint {
				font-size: 9.5px;
				font-weight: 500;
				color: #6c7383;
				padding: 2px 6px;
				border-radius: 4px;
				background: rgba(255, 255, 255, 0.04);
				border: 1px solid rgba(255, 255, 255, 0.06);
				margin-left: 6px;
			}
			.toggle-row .lbl-wrap {
				display: flex;
				align-items: center;
			}
		</style>
	</head>
	<body>
		<div class="page">
			<div class="glow g1"></div>
			<div class="window">
				<div class="titlebar">
					<div class="dots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
					<div class="name">Vibe</div>
					<div style="width: 52px"></div>
				</div>
				<div class="content">
					<div class="brand">
						<div class="logo">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
								<path
									d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
							</svg>
						</div>
						<h1>Vibe</h1>
						<span class="badge">Groq Cloud<span class="api">API</span></span>
					</div>
					<div class="row">
						<select class="select">
							<option>Auto-detect (English)</option>
						</select>
						<select class="select">
							<option>Whisper Large v3 Turbo</option>
						</select>
						<button class="iconbtn" aria-label="Settings">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
								<path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
								<path
									d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9c.36.65.86 1.04 1.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z" />
							</svg>
						</button>
					</div>
					<div class="divider"></div>
					<div class="dictation">
						<div class="icon">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
								<path
									d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
							</svg>
						</div>
						<div class="text">
							<h2>Global dictation</h2>
							<p>Press the hotkey and speak</p>
						</div>
						<div class="switch on"></div>
					</div>
					<div class="card">
						<div class="field">
							<label>
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
									<rect x="2" y="6" width="20" height="12" rx="2" />
									<path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M6 14h.01M18 14h.01" />
								</svg>
								Global hotkey shortcut
							</label>
							<div class="keys">
								<span class="kbd">Ctrl</span>
								<span class="kbd">Shift</span>
								<span class="kbd">D</span>
								<input class="kbd-input" value="Ctrl+Shift+D" readonly />
							</div>
						</div>
						<div class="field">
							<label>
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
									<circle cx="12" cy="12" r="2" />
									<path d="M16.24 7.76a6 6 0 010 8.49M7.76 16.24a6 6 0 010-8.49M19.07 4.93a10 10 0 010 14.14M4.93 19.07a10 10 0 010-14.14" />
								</svg>
								Output
							</label>
							<div class="modes">
								<button class="mode active">Clipboard</button>
								<button class="mode">Type</button>
							</div>
						</div>
						<div class="toggle-row">
							<div class="lbl-wrap">
								<span class="lbl">Raw text (no line breaks)</span>
								<span class="hint">N/A · API</span>
							</div>
							<div class="switch"></div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
