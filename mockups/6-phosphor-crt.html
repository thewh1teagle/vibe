<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Vibe — Phosphor CRT</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			html,
			body {
				height: 100%;
				font-family: 'JetBrains Mono', ui-monospace, monospace;
				color: #00ff88;
				-webkit-font-smoothing: antialiased;
			}
			.page {
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 40px 16px;
				background: #000;
				position: relative;
				overflow: hidden;
			}
			.page::before {
				content: '';
				position: absolute;
				inset: 0;
				background: repeating-linear-gradient(
					0deg,
					rgba(0, 0, 0, 0) 0,
					rgba(0, 0, 0, 0) 2px,
					rgba(0, 0, 0, 0.35) 2px,
					rgba(0, 0, 0, 0.35) 3px
				);
				pointer-events: none;
				z-index: 1;
			}
			.page::after {
				content: '';
				position: absolute;
				inset: 0;
				background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.5) 100%);
				pointer-events: none;
				z-index: 1;
			}
			.window {
				width: 480px;
				height: 470px;
				background: #000;
				border: 1px solid rgba(0, 255, 136, 0.3);
				box-shadow:
					0 0 0 1px rgba(0, 255, 136, 0.05),
					0 0 40px rgba(0, 255, 136, 0.08),
					inset 0 0 60px rgba(0, 255, 136, 0.02);
				display: flex;
				flex-direction: column;
				overflow: hidden;
				position: relative;
				border-radius: 2px;
			}
			.titlebar {
				height: 30px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 0 12px;
				border-bottom: 1px solid rgba(0, 255, 136, 0.25);
				font-size: 10px;
				font-weight: 500;
				letter-spacing: 0.04em;
				color: rgba(0, 255, 136, 0.7);
			}
			.titlebar .left::before {
				content: '┌─ ';
				color: rgba(0, 255, 136, 0.5);
			}
			.titlebar .right::after {
				content: ' ─┐';
				color: rgba(0, 255, 136, 0.5);
			}
			.titlebar .right {
				color: rgba(0, 255, 136, 0.5);
			}
			.content {
				padding: 14px 16px 16px;
				display: flex;
				flex-direction: column;
				gap: 12px;
				flex: 1;
				overflow: hidden;
				color: #00ff88;
				text-shadow: 0 0 4px rgba(0, 255, 136, 0.6);
			}
			.brand {
				display: flex;
				align-items: center;
				gap: 10px;
			}
			.brand .logo {
				width: 30px;
				height: 30px;
				border: 1px solid #00ff88;
				display: grid;
				place-items: center;
				background: rgba(0, 255, 136, 0.05);
				box-shadow: 0 0 8px rgba(0, 255, 136, 0.3) inset, 0 0 6px rgba(0, 255, 136, 0.2);
			}
			.brand .logo svg {
				width: 14px;
				height: 14px;
				color: #00ff88;
			}
			.brand h1 {
				font-size: 14px;
				font-weight: 700;
				letter-spacing: 0.08em;
				color: #00ff88;
			}
			.badge {
				margin-left: auto;
				font-size: 9.5px;
				font-weight: 600;
				letter-spacing: 0.06em;
				padding: 3px 8px;
				display: inline-flex;
				align-items: center;
				gap: 4px;
				color: #00ff88;
				border: 1px solid #00ff88;
				background: rgba(0, 255, 136, 0.08);
				box-shadow: 0 0 6px rgba(0, 255, 136, 0.25);
			}
			.badge::before {
				content: '◉';
				color: #00ff88;
				font-size: 8px;
				animation: pulse 1.4s ease-in-out infinite;
			}
			@keyframes pulse {
				0%, 100% { opacity: 1; }
				50% { opacity: 0.3; }
			}
			.row {
				display: flex;
				gap: 0;
				align-items: stretch;
				border: 1px solid #00ff88;
			}
			.select {
				flex: 1;
				height: 30px;
				padding: 0 24px 0 8px;
				font-family: 'JetBrains Mono', monospace;
				font-size: 10.5px;
				font-weight: 500;
				color: #00ff88;
				background: #000;
				border: 0;
				border-right: 1px solid #00ff88;
				appearance: none;
				background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='9' height='9' viewBox='0 0 24 24' fill='none' stroke='%2300ff88' stroke-width='2.5' stroke-linecap='square' stroke-linejoin='miter'><polyline points='6 9 12 15 18 9'/></svg>");
				background-repeat: no-repeat;
				background-position: right 7px center;
				text-shadow: 0 0 4px rgba(0, 255, 136, 0.6);
			}
			.select:focus {
				outline: 0;
				background: rgba(0, 255, 136, 0.05);
			}
			.iconbtn {
				width: 30px;
				display: grid;
				place-items: center;
				background: #000;
				border: 0;
				color: #00ff88;
				cursor: pointer;
				transition: all 0.1s ease;
			}
			.iconbtn:hover {
				background: rgba(0, 255, 136, 0.15);
				box-shadow: 0 0 8px rgba(0, 255, 136, 0.3);
			}
			.iconbtn svg {
				width: 13px;
				height: 13px;
			}
			.dictation {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 8px 10px;
				border: 1px solid #00ff88;
				background: rgba(0, 255, 136, 0.04);
			}
			.dictation .icon {
				width: 28px;
				height: 28px;
				border: 1px solid #00ff88;
				display: grid;
				place-items: center;
				background: rgba(0, 255, 136, 0.08);
				box-shadow: 0 0 6px rgba(0, 255, 136, 0.2);
			}
			.dictation .icon svg {
				width: 12px;
				height: 12px;
				color: #00ff88;
			}
			.dictation .text {
				flex: 1;
			}
			.dictation .text h2 {
				font-size: 11px;
				font-weight: 700;
				color: #00ff88;
				letter-spacing: 0.06em;
			}
			.dictation .text h2::before {
				content: '> ';
				color: rgba(0, 255, 136, 0.5);
			}
			.dictation .text p {
				font-size: 9.5px;
				color: rgba(0, 255, 136, 0.65);
				margin-top: 2px;
				letter-spacing: 0.02em;
			}
			.switch {
				width: 34px;
				height: 16px;
				background: #000;
				border: 1px solid #00ff88;
				position: relative;
				cursor: pointer;
				flex-shrink: 0;
				box-shadow: 0 0 4px rgba(0, 255, 136, 0.2);
			}
			.switch::after {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				width: 16px;
				height: 16px;
				background: rgba(0, 255, 136, 0.3);
				transition: all 0.1s ease;
			}
			.switch.on {
				background: rgba(0, 255, 136, 0.15);
				box-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
			}
			.switch.on::after {
				transform: translateX(18px);
				background: #00ff88;
				box-shadow: 0 0 8px rgba(0, 255, 136, 0.7);
			}
			.card {
				border: 1px solid #00ff88;
				padding: 10px 12px;
				display: flex;
				flex-direction: column;
				gap: 10px;
				background: rgba(0, 255, 136, 0.02);
			}
			.field {
				display: flex;
				flex-direction: column;
				gap: 4px;
			}
			.field label {
				display: flex;
				align-items: center;
				gap: 4px;
				font-size: 9.5px;
				font-weight: 600;
				color: rgba(0, 255, 136, 0.7);
				letter-spacing: 0.08em;
			}
			.field label::before {
				content: '$ ';
				color: rgba(0, 255, 136, 0.5);
			}
			.field label svg {
				width: 9px;
				height: 9px;
			}
			.keys {
				display: flex;
				align-items: center;
				gap: 3px;
			}
			.kbd {
				font-family: 'JetBrains Mono', monospace;
				font-size: 9.5px;
				font-weight: 700;
				color: #00ff88;
				padding: 3px 6px;
				min-width: 20px;
				text-align: center;
				background: #000;
				border: 1px solid #00ff88;
				box-shadow: 0 0 4px rgba(0, 255, 136, 0.3);
			}
			.kbd-input {
				flex: 1;
				font-family: 'JetBrains Mono', monospace;
				font-size: 9.5px;
				color: #00ff88;
				padding: 4px 7px;
				background: #000;
				border: 1px solid rgba(0, 255, 136, 0.5);
				outline: none;
				text-shadow: 0 0 4px rgba(0, 255, 136, 0.6);
			}
			.modes {
				display: flex;
				gap: 0;
				border: 1px solid #00ff88;
			}
			.mode {
				flex: 1;
				padding: 6px 0;
				text-align: center;
				font-family: 'JetBrains Mono', monospace;
				font-size: 10px;
				font-weight: 600;
				letter-spacing: 0.06em;
				cursor: pointer;
				background: #000;
				border: 0;
				border-right: 1px solid #00ff88;
				color: rgba(0, 255, 136, 0.6);
				transition: all 0.1s ease;
			}
			.mode:last-child {
				border-right: 0;
			}
			.mode:hover {
				background: rgba(0, 255, 136, 0.08);
				color: #00ff88;
			}
			.mode.active {
				background: rgba(0, 255, 136, 0.2);
				color: #00ff88;
				text-shadow: 0 0 6px rgba(0, 255, 136, 0.8);
				box-shadow: inset 0 0 8px rgba(0, 255, 136, 0.3);
			}
			.toggle-row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding-top: 2px;
			}
			.toggle-row .lbl {
				font-size: 10px;
				font-weight: 500;
				color: rgba(0, 255, 136, 0.75);
				letter-spacing: 0.04em;
			}
			.toggle-row .lbl::before {
				content: '# ';
				color: rgba(0, 255, 136, 0.5);
			}
		</style>
	</head>
	<body>
		<div class="page">
			<div class="window">
				<div class="titlebar">
					<div class="left">vibe@local:~$</div>
					<div class="right">tty1</div>
				</div>
				<div class="content">
					<div class="brand">
						<div class="logo">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
								<path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
							</svg>
						</div>
						<h1>VIBE</h1>
						<span class="badge">[ LOCAL ]</span>
					</div>

					<div class="row">
						<select class="select">
							<option>auto-detect-en</option>
						</select>
						<select class="select">
							<option>whisper-large-v3</option>
						</select>
						<button class="iconbtn" aria-label="Settings">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
								<path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
								<path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9c.36.65.86 1.04 1.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z" />
							</svg>
						</button>
					</div>

					<div class="dictation">
						<div class="icon">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
								<path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
							</svg>
						</div>
						<div class="text">
							<h2>global_dictation</h2>
							<p>press_hotkey && speak</p>
						</div>
						<div class="switch on"></div>
					</div>

					<div class="card">
						<div class="field">
							<label>hotkey_binding</label>
							<div class="keys">
								<span class="kbd">CTRL</span>
								<span class="kbd">SHIFT</span>
								<span class="kbd">D</span>
								<input class="kbd-input" value="ctrl+shift+d" readonly />
							</div>
						</div>

						<div class="field">
							<label>output_mode</label>
							<div class="modes">
								<button class="mode active">clipboard</button>
								<button class="mode">type</button>
							</div>
						</div>

						<div class="toggle-row">
							<span class="lbl">raw_output_no_newlines</span>
							<div class="switch"></div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
