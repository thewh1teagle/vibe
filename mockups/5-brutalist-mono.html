<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Vibe — Brutalist Mono</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			html,
			body {
				height: 100%;
				font-family: 'JetBrains Mono', ui-monospace, monospace;
				color: #f0f0f0;
				-webkit-font-smoothing: antialiased;
			}
			.page {
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 40px 16px;
				background:
					repeating-linear-gradient(
						0deg,
						transparent 0,
						transparent 39px,
						rgba(212, 255, 0, 0.025) 39px,
						rgba(212, 255, 0, 0.025) 40px
					),
					#0a0a0a;
				position: relative;
			}
			.window {
				width: 480px;
				height: 470px;
				background: #0a0a0a;
				border: 1px solid #2a2a2a;
				display: flex;
				flex-direction: column;
				overflow: hidden;
				position: relative;
				box-shadow: 4px 4px 0 #d4ff00;
			}
			.titlebar {
				height: 32px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 0 12px;
				border-bottom: 1px solid #2a2a2a;
				background: #0a0a0a;
				font-size: 10px;
				font-weight: 700;
				letter-spacing: 0.08em;
				text-transform: uppercase;
			}
			.titlebar .left {
				color: #6a6a6a;
			}
			.titlebar .left span {
				color: #d4ff00;
			}
			.titlebar .right {
				display: flex;
				gap: 12px;
				color: #6a6a6a;
			}
			.titlebar .right .x {
				color: #d4ff00;
				cursor: pointer;
			}
			.content {
				padding: 16px 18px 18px;
				display: flex;
				flex-direction: column;
				gap: 14px;
				flex: 1;
				overflow: hidden;
			}
			.brand {
				display: flex;
				align-items: center;
				gap: 10px;
			}
			.brand .logo {
				width: 32px;
				height: 32px;
				border: 1.5px solid #f0f0f0;
				display: grid;
				place-items: center;
				background: #0a0a0a;
			}
			.brand .logo svg {
				width: 16px;
				height: 16px;
				color: #d4ff00;
			}
			.brand h1 {
				font-size: 16px;
				font-weight: 800;
				letter-spacing: 0.02em;
				color: #f0f0f0;
				text-transform: uppercase;
			}
			.badge {
				margin-left: auto;
				font-size: 9.5px;
				font-weight: 700;
				letter-spacing: 0.1em;
				padding: 4px 8px;
				display: inline-flex;
				align-items: center;
				gap: 6px;
				color: #d4ff00;
				border: 1px solid #d4ff00;
				text-transform: uppercase;
			}
			.badge::before {
				content: '';
				width: 6px;
				height: 6px;
				background: #d4ff00;
			}
			.row {
				display: flex;
				gap: 0;
				align-items: stretch;
				border: 1px solid #2a2a2a;
			}
			.select {
				flex: 1;
				height: 34px;
				padding: 0 26px 0 10px;
				font-family: 'JetBrains Mono', monospace;
				font-size: 11px;
				font-weight: 500;
				color: #f0f0f0;
				background: #0a0a0a;
				border: 0;
				border-right: 1px solid #2a2a2a;
				appearance: none;
				background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='9' height='9' viewBox='0 0 24 24' fill='none' stroke='%23d4ff00' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
				background-repeat: no-repeat;
				background-position: right 9px center;
			}
			.select:focus {
				outline: 0;
				background: #141414;
			}
			.iconbtn {
				width: 34px;
				display: grid;
				place-items: center;
				background: #0a0a0a;
				border: 0;
				color: #6a6a6a;
				cursor: pointer;
				transition: all 0.1s ease;
			}
			.iconbtn:hover {
				background: #d4ff00;
				color: #0a0a0a;
			}
			.iconbtn svg {
				width: 14px;
				height: 14px;
			}
			.section-label {
				font-size: 9px;
				font-weight: 700;
				letter-spacing: 0.15em;
				color: #6a6a6a;
				text-transform: uppercase;
			}
			.dictation {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 10px 12px;
				border: 1px solid #2a2a2a;
			}
			.dictation .icon {
				width: 32px;
				height: 32px;
				border: 1.5px solid #d4ff00;
				display: grid;
				place-items: center;
				background: #0a0a0a;
			}
			.dictation .icon svg {
				width: 14px;
				height: 14px;
				color: #d4ff00;
			}
			.dictation .text {
				flex: 1;
			}
			.dictation .text h2 {
				font-size: 11.5px;
				font-weight: 700;
				color: #f0f0f0;
				letter-spacing: 0.04em;
				text-transform: uppercase;
			}
			.dictation .text p {
				font-size: 10px;
				color: #6a6a6a;
				margin-top: 2px;
				letter-spacing: 0.02em;
			}
			.switch {
				width: 38px;
				height: 18px;
				background: #0a0a0a;
				border: 1.5px solid #2a2a2a;
				position: relative;
				cursor: pointer;
				flex-shrink: 0;
				transition: all 0.1s ease;
			}
			.switch::after {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				width: 18px;
				height: 18px;
				background: #6a6a6a;
				transition: all 0.1s ease;
			}
			.switch.on {
				background: #d4ff00;
				border-color: #d4ff00;
			}
			.switch.on::after {
				transform: translateX(20px);
				background: #0a0a0a;
			}
			.card {
				border: 1px solid #2a2a2a;
				padding: 12px;
				display: flex;
				flex-direction: column;
				gap: 12px;
			}
			.field {
				display: flex;
				flex-direction: column;
				gap: 5px;
			}
			.field label {
				display: flex;
				align-items: center;
				gap: 5px;
				font-size: 9.5px;
				font-weight: 700;
				color: #6a6a6a;
				letter-spacing: 0.12em;
				text-transform: uppercase;
			}
			.field label svg {
				width: 10px;
				height: 10px;
			}
			.keys {
				display: flex;
				align-items: center;
				gap: 4px;
			}
			.kbd {
				font-family: 'JetBrains Mono', monospace;
				font-size: 10px;
				font-weight: 700;
				color: #f0f0f0;
				padding: 4px 7px;
				min-width: 22px;
				text-align: center;
				background: #0a0a0a;
				border: 1px solid #2a2a2a;
			}
			.kbd-input {
				flex: 1;
				font-family: 'JetBrains Mono', monospace;
				font-size: 10px;
				font-weight: 500;
				color: #d4ff00;
				padding: 5px 8px;
				background: #0a0a0a;
				border: 1px solid #2a2a2a;
				outline: none;
			}
			.modes {
				display: flex;
				gap: 0;
				border: 1px solid #2a2a2a;
			}
			.mode {
				flex: 1;
				padding: 7px 0;
				text-align: center;
				font-family: 'JetBrains Mono', monospace;
				font-size: 10.5px;
				font-weight: 700;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				cursor: pointer;
				background: #0a0a0a;
				border: 0;
				border-right: 1px solid #2a2a2a;
				color: #6a6a6a;
				transition: all 0.1s ease;
			}
			.mode:last-child {
				border-right: 0;
			}
			.mode:hover {
				background: #141414;
				color: #f0f0f0;
			}
			.mode.active {
				background: #d4ff00;
				color: #0a0a0a;
			}
			.toggle-row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 6px 0 0;
				border-top: 1px solid #2a2a2a;
				margin-top: 2px;
			}
			.toggle-row .lbl {
				font-size: 10px;
				font-weight: 700;
				color: #6a6a6a;
				letter-spacing: 0.1em;
				text-transform: uppercase;
			}
		</style>
	</head>
	<body>
		<div class="page">
			<div class="window">
				<div class="titlebar">
					<div class="left">VIBE <span>//</span> v1.1.1</div>
					<div class="right">
						<span>— □</span>
						<span class="x">×</span>
					</div>
				</div>
				<div class="content">
					<div class="brand">
						<div class="logo">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
								<path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
							</svg>
						</div>
						<h1>Vibe</h1>
						<span class="badge">LOCAL</span>
					</div>

					<div class="row">
						<select class="select">
							<option>AUTO · EN</option>
						</select>
						<select class="select">
							<option>WHISPER_LARGE_V3</option>
						</select>
						<button class="iconbtn" aria-label="Settings">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
								<path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
								<path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9c.36.65.86 1.04 1.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z" />
							</svg>
						</button>
					</div>

					<div class="section-label">// GLOBAL_DICTATION</div>

					<div class="dictation">
						<div class="icon">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
								<path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
							</svg>
						</div>
						<div class="text">
							<h2>ENABLED</h2>
							<p>PRESS_HOTKEY → SPEAK → OUTPUT</p>
						</div>
						<div class="switch on"></div>
					</div>

					<div class="card">
						<div class="field">
							<label>
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
									<rect x="2" y="6" width="20" height="12" />
									<path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M6 14h.01M18 14h.01" />
								</svg>
								HOTKEY_BINDING
							</label>
							<div class="keys">
								<span class="kbd">CTRL</span>
								<span class="kbd">SHIFT</span>
								<span class="kbd">D</span>
								<input class="kbd-input" value="CTRL+SHIFT+D" readonly />
							</div>
						</div>

						<div class="field">
							<label>
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
									<circle cx="12" cy="12" r="2" />
									<path d="M16.24 7.76a6 6 0 010 8.49M7.76 16.24a6 6 0 010-8.49M19.07 4.93a10 10 0 010 14.14M4.93 19.07a10 10 0 010-14.14" />
								</svg>
								OUTPUT_MODE
							</label>
							<div class="modes">
								<button class="mode active">CLIPBOARD</button>
								<button class="mode">TYPE</button>
							</div>
						</div>

						<div class="toggle-row">
							<span class="lbl">RAW_OUTPUT (NO_NEWLINES)</span>
							<div class="switch"></div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
